id: harness-engineering
name: Harness Engineering
version: "1.0.0"
status: active
description: 프로젝트 작업을 실행 명령, 검증 기준, 증거 로그, 산출물 위치로 묶어 반복 가능하게 운영하는 Skill
owner: "{{OWNER_NAME}}"
updated_at: "{{YYYY-MM-DD}}"
input:
  - task request
  - existing commands
  - quality gates
  - project constraints
output:
  - harness plan
  - command inventory updates
  - verification evidence
  - risks and gaps
triggers:
  - project initialization
  - before implementation
  - before release
  - when verification is unclear
read_first:
  - SKILL.md
  - harness/README.md
  - harness/harness.yaml
  - harness/commands.md
  - harness/verification-matrix.md
constraints:
  - 실행하지 않은 검증을 완료로 보고하지 않는다.
  - 명령과 결과를 분리해 기록한다.
  - 위험 명령은 승인 필요 여부를 먼저 확인한다.
quality_gate:
  - 실행 명령 목록이 있다.
  - 작업 유형별 최소 검증이 있다.
  - 증거 로그 위치가 있다.
  - 미검증 항목이 명확히 기록되어 있다.
