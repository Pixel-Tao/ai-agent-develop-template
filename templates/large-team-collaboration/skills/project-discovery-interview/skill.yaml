id: project-discovery-interview
name: Project Discovery Interview
version: "1.0.0"
status: active
description: 사용자의 막연한 프로젝트 아이디어를 목표, 사용자, 콘텐츠, 기술 범위, 성공 기준으로 구체화하는 인터뷰 Skill
owner: TAO
updated_at: "2026-05-12"
input:
  - initial project idea
  - constraints
  - target users
output:
  - project-definition-brief
  - decisions
  - assumptions
  - open questions
triggers:
  - project initialization
  - unclear requirements
  - new project kickoff
read_first:
  - SKILL.md
  - project-discovery-interview.md
  - inputs/source-documents-index.md
constraints:
  - 사용자의 모호한 답변을 확정 요구사항으로 취급하지 않는다.
  - 결정, 가정, 미정을 분리한다.
quality_gate:
  - 목표와 비목표가 분리되어 있다.
  - 핵심 사용자와 성공 기준이 있다.
  - 기술/콘텐츠/운영 제약이 기록되어 있다.
