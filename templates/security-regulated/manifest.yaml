project:
  id: "{{PROJECT_ID}}"
  name: "{{PROJECT_NAME}}"
  type: "security-regulated"
  status: "{{PROJECT_STATUS}}"
  owner: "{{OWNER_NAME}}"
  updated_at: "{{YYYY-MM-DD}}"

template:
  id: "security-regulated"
  version: "1.0.0"

entrypoints:
  init:
    - INIT.md
    - inputs/source-documents-index.md
    - harness/harness.yaml
  init_archive:
    - docs/09_agent_state/archive/init/
  read_first:
    - README.md
    - AGENTS.md
    - manifest.yaml
    - docs/09_agent_state/current-status.md
    - docs/00_context/project-discovery-interview.md
    - inputs/source-documents-index.md
    - harness/harness.yaml

folders:
  docs: docs
  skills: skills
  source: src
  tests: tests
  data: data
  outputs: outputs
  inputs: inputs
  harness: harness

rules:
  default_doc_format: markdown
  metadata_format: yaml
  file_naming: lower-kebab-case
  date_format: YYYY-MM-DD
  language: Korean

lifecycle:
  status: "{{PROJECT_STATUS}}"
  allowed_statuses:
    - initializing
    - active-development
    - stabilization
    - pre-delivery
    - delivery-sanitization
    - delivered
    - archived

delivery:
  sanitization_required: true
  policy: delivery/sanitize-policy.yaml
  manifest: delivery/delivery-manifest.yaml
  exclude_file: .deliveryignore
  agent_ignore_file: .agentignore
  package_output: dist/delivery
  archive_output: dist/internal-archive