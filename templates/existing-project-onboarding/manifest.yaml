project:
  id: "{{PROJECT_ID}}"
  name: "{{PROJECT_NAME}}"
  type: "existing-project-onboarding"
  status: "{{PROJECT_STATUS}}"
  owner: "TAO"
  updated_at: "2026-05-12"

template:
  id: "existing-project-onboarding"
  version: "1.0.0"

entrypoints:
  read_first:
    - README.md
    - AGENTS.md
    - manifest.yaml
    - docs/09_agent_state/current-status.md

folders:
  docs: docs
  skills: skills
  source: src
  tests: tests
  data: data
  outputs: outputs

rules:
  default_doc_format: markdown
  metadata_format: yaml
  file_naming: lower-kebab-case
  date_format: YYYY-MM-DD
  language: Korean
