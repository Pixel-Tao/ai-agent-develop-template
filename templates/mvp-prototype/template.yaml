id: "mvp-prototype"
name: "MVP Prototype"
version: "1.0.0"
status: "active"
updated_at: "2026-05-12"
owner: "TAO"

description: "아이디어 검증과 빠른 프로토타입 개발을 위한 경량 구조"

best_for:
  - "빠른 검증"
  - "짧은 실험 주기"
  - "범위가 작은 MVP"

not_for:
  - "규제 프로젝트"
  - "대규모 장기 운영 프로젝트"

complexity: "low"
governance_level: "low"
agent_structure: "single"
recommended_team_size: "1~4명"

required_files:
  - README.md
  - AGENTS.md
  - manifest.yaml

optional_files:
  - outputs
  - docs/09_agent_state/handoff-notes.md

entrypoints:
  human:
    - README.md
  agent:
    - AGENTS.md
    - manifest.yaml

quality_gate:
  minimum:
    - README.md exists
    - AGENTS.md exists
    - manifest.yaml exists
    - docs/09_agent_state/current-status.md exists

initialization:
  prompt: initialization-prompt.md
  checklist: validation-checklist.md
