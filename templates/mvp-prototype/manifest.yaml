project:
  id: "{{PROJECT_ID}}"
  name: "{{PROJECT_NAME}}"
  type: "mvp-prototype"
  status: "{{PROJECT_STATUS}}"
  owner: "{{OWNER_NAME}}"
  updated_at: "{{YYYY-MM-DD}}"

template:
  id: "mvp-prototype"
  version: "1.0.0"

entrypoints:
  read_first:
    - README.md
    - AGENTS.md
    - manifest.yaml
    - docs/09_agent_state/current-status.md
    - docs/project-discovery-interview.md
    - inputs/source-documents-index.md
    - harness/harness.yaml

folders:
  docs: docs
  skills: skills
  source: src
  tests: tests
  data: data
  outputs: outputs
  inputs: inputs
  harness: harness

rules:
  default_doc_format: markdown
  metadata_format: yaml
  file_naming: lower-kebab-case
  date_format: YYYY-MM-DD
  language: Korean
