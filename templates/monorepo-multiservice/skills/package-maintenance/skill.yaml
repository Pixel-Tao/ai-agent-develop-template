id: package-maintenance
name: Package Maintenance
version: "1.0.0"
status: active
description: Package Maintenance 작업을 수행하기 위한 템플릿 전용 Skill
owner: "{{OWNER_NAME}}"
updated_at: "{{YYYY-MM-DD}}"
input:
  - task description
  - related project documents
output:
  - result summary
  - verification notes
triggers:
  - package-maintenance
read_first:
  - SKILL.md
constraints:
  - 템플릿의 AGENTS.md 규칙을 우선한다.
quality_gate:
  - 산출물과 검증 결과가 기록되어 있다.
