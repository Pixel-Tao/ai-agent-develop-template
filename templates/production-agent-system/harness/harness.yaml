id: harness-engineering
name: Harness Engineering
version: "1.0.0"
status: active
owner: "{{OWNER_NAME}}"
updated_at: "{{YYYY-MM-DD}}"

template:
  id: production-agent-system
  name: "Production Agent System"

purpose: "Agent runtime, tool calling, memory, eval, observability, security, and deployment verification evidence."

inputs:
  - task request
  - project context
  - source documents
  - existing commands

outputs:
  - command inventory
  - verification matrix
  - evidence log
  - harness reports

required_files:
  - harness/README.md
  - harness/harness.yaml
  - harness/commands.md
  - harness/verification-matrix.md
  - harness/evidence-log.md

quality_gates:
  - runtime smoke path identified
  - tool risk policy identified
  - memory namespace policy identified
  - eval smoke dataset identified
  - redaction policy identified
  - deployment healthcheck target identified
  - docker build command identified
  - worker queue verification identified

artifact_locations:
  fixtures: harness/fixtures
  scripts: harness/scripts
  reports: harness/reports
  evidence_log: harness/evidence-log.md
