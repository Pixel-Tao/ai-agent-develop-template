id: "production-agent-system"
name: "Production Agent System"
version: "1.0.0"
status: "active"
updated_at: "{{YYYY-MM-DD}}"
owner: "{{OWNER_NAME}}"

description: "실제 AI Agent 서비스를 생성, 실행, 평가, 추적, 배포하기 위한 시스템 템플릿"

best_for:
  - "실제 AI Agent API 서버"
  - "tool calling이 있는 Agent"
  - "RAG, workflow, background worker가 필요한 Agent"
  - "평가와 tracing이 필요한 Agent"
  - "운영 배포 대상 Agent"

not_for:
  - "단순 문서 정리 프로젝트"
  - "빠른 MVP 문서 템플릿"
  - "Agent runtime이 필요 없는 일반 앱"

complexity: "high"
governance_level: "high"
agent_structure: "runtime-system"
recommended_team_size: "2~10명"

required_files:
  - README.md
  - README.en.md
  - AGENTS.md
  - manifest.yaml
  - INIT.md
  - template.yaml
  - validation-checklist.md
