entrypoints:
  human:
    - README.md
  agent:
    - AGENTS.md
    - manifest.yaml
    - harness/harness.yaml
    - tools/tool-registry.yaml
    - security/approval-policy.md

quality_gate:
  minimum:
    - README.md exists
    - AGENTS.md exists
    - manifest.yaml exists
    - package.json exists
    - tsconfig.json exists
    - src/index.ts exists
    - tests/runtime.test.ts exists
    - scripts/validate-tools.mjs exists
    - src/memory/memory-store.ts exists
    - src/memory/checkpoint-store.ts exists
    - src/memory/memory-policy.ts exists
    - src/evals/eval-runner.ts exists
    - src/observability/tracer.ts exists
    - src/observability/logger.ts exists
    - src/observability/metrics.ts exists
    - tests/observability.test.ts exists
    - src/security/policy-engine.ts exists
    - src/security/approval-gate.ts exists
    - src/security/prompt-injection-check.ts exists
    - tests/security.test.ts exists
    - src/api/health.ts exists
    - src/api/healthcheck.ts exists
    - src/workers/queue.ts exists
    - tests/api.test.ts exists
    - tests/deployment.test.ts exists
    - deploy/Dockerfile exists
    - deploy/docker-compose.yml exists
    - scripts/validate-structure.mjs exists
    - evals/datasets/smoke.yaml exists
    - tools/tool-registry.yaml exists
    - security/approval-policy.md exists
    - harness/harness.yaml exists
    - harness/evidence-log.md exists
    - docs/09_agent_state/current-status.md exists

initialization:
  init_prompt: INIT.md
  archive_after_completion: docs/09_agent_state/archive/init
  prompt: initialization-prompt.md
  checklist: validation-checklist.md
