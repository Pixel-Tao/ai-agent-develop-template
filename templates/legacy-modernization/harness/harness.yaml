id: harness-engineering
name: Harness Engineering
version: "1.0.0"
status: active
owner: "{{OWNER_NAME}}"
updated_at: "{{YYYY-MM-DD}}"

template:
  id: legacy-modernization
  name: "Legacy Modernization"

purpose: "기존 동작 보존을 검증하는 characterization harness를 우선 만든다."

inputs:
  - task request
  - project context
  - source documents
  - existing commands

outputs:
  - command inventory
  - verification matrix
  - evidence log
  - harness reports

required_files:
  - harness/README.md
  - harness/harness.yaml
  - harness/commands.md
  - harness/verification-matrix.md
  - harness/evidence-log.md

quality_gates:
  - behavior map 연결
  - characterization test 존재
  - rollback command 확인
  - migration diff evidence

artifact_locations:
  fixtures: harness/fixtures
  scripts: harness/scripts
  reports: harness/reports
  evidence_log: harness/evidence-log.md
