id: "legacy-modernization"
name: "Legacy Modernization"
version: "1.0.0"
status: "active"
updated_at: "{{YYYY-MM-DD}}"
owner: "{{OWNER_NAME}}"

description: "레거시 프로젝트 개선, 리팩터링, 마이그레이션을 위한 구조"

best_for:
  - "오래된 코드베이스"
  - "테스트 부족 영역 개선"
  - "기술 스택 전환"

not_for:
  - "처음부터 새로 만드는 프로젝트"
  - "동작 보존이 중요하지 않은 실험"

complexity: "high"
governance_level: "medium"
agent_structure: "single"
recommended_team_size: "2~8명"

required_files:
  - README.md
  - AGENTS.md
  - manifest.yaml
  - INIT.md
  - inputs/source-documents-index.md
  - harness/harness.yaml
  - harness/commands.md
  - harness/verification-matrix.md

  - README.en.md
  - delivery/sanitize-policy.yaml
  - delivery/delivery-manifest.yaml
  - delivery/delivery-checklist.md
  - delivery/archive-checklist.md
  - delivery/purge-checklist.md
  - .deliveryignore
  - .agentignore

  - skills/skills-sh-recommendations.yaml

optional_files:
  - CLAUDE.md
  - harness/reports
  - harness/fixtures
  - inputs/initial-development-docs
  - inputs/references
  - outputs
  - docs/09_agent_state/handoff-notes.md

entrypoints:
  human:
    - README.md
  agent:
    - AGENTS.md
    - manifest.yaml
    - inputs/source-documents-index.md
    - harness/harness.yaml

quality_gate:
  minimum:
    - README.md exists
    - AGENTS.md exists
    - manifest.yaml exists
    - docs/09_agent_state/current-status.md exists
    - inputs/source-documents-index.md exists
    - harness/harness.yaml exists
    - harness/commands.md exists
    - harness/verification-matrix.md exists
    - docs/09_agent_state/archive/init/README.md exists

initialization:
  init_prompt: INIT.md
  archive_after_completion: docs/09_agent_state/archive/init
  prompt: initialization-prompt.md
  checklist: validation-checklist.md
