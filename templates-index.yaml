templates:
  - id: greenfield-basic
    name: Greenfield Basic
    path: templates/greenfield-basic
    description: 신규 개발 프로젝트를 위한 기본 AI Agent 친화 구조
    best_for:
      - 신규 프로젝트
      - 1~3인 소규모 개발
      - 빠른 초기 세팅
    not_for:
      - 이미 복잡한 코드베이스가 있는 프로젝트
      - 역할 분리가 필요한 대규모 프로젝트
    complexity: low
    governance_level: low
    agent_structure: single-agent-instruction
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: existing-project-onboarding
    name: Existing Project Onboarding
    path: templates/existing-project-onboarding
    description: 기존 코드베이스 분석과 AI Agent 투입을 위한 온보딩 구조
    best_for:
      - 기존 코드베이스
      - 문서 부족 프로젝트
      - 변경 전 영향 분석이 필요한 프로젝트
    not_for:
      - 코드가 거의 없는 신규 프로젝트
      - 빠른 폐기형 프로토타입
    complexity: medium
    governance_level: medium
    agent_structure: single-agent-instruction
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: large-team-collaboration
    name: Large Team Collaboration
    path: templates/large-team-collaboration
    description: 역할 기반 협업과 승인 흐름이 필요한 대규모 프로젝트 구조
    best_for:
      - 대규모 협업
      - 역할별 책임 분리
      - 승인과 인수인계가 중요한 프로젝트
    not_for:
      - 1인 프로젝트
      - 문서 유지 비용을 감당하기 어려운 실험
    complexity: high
    governance_level: high
    agent_structure: role-based-router
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: legacy-modernization
    name: Legacy Modernization
    path: templates/legacy-modernization
    description: 레거시 프로젝트 개선, 리팩터링, 마이그레이션을 위한 구조
    best_for:
      - 오래된 코드베이스
      - 테스트 부족 영역 개선
      - 기술 스택 전환
    not_for:
      - 처음부터 새로 만드는 프로젝트
      - 동작 보존이 중요하지 않은 실험
    complexity: high
    governance_level: medium
    agent_structure: single-agent-instruction
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: mvp-prototype
    name: MVP Prototype
    path: templates/mvp-prototype
    description: 아이디어 검증과 빠른 프로토타입 개발을 위한 경량 구조
    best_for:
      - 빠른 검증
      - 짧은 실험 주기
      - 범위가 작은 MVP
    not_for:
      - 규제 프로젝트
      - 대규모 장기 운영 프로젝트
    complexity: low
    governance_level: low
    agent_structure: single-agent-instruction
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: monorepo-multiservice
    name: Monorepo Multiservice
    path: templates/monorepo-multiservice
    description: 모노레포와 멀티서비스 의존성 관리를 위한 구조
    best_for:
      - 모노레포
      - 멀티서비스
      - 공통 패키지 관리
    not_for:
      - 단일 앱 소규모 프로젝트
      - 서비스 경계가 아직 없는 프로토타입
    complexity: high
    governance_level: medium
    agent_structure: role-based-router
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: security-regulated
    name: Security Regulated
    path: templates/security-regulated
    description: 보안, 감사, 규제 요구사항이 중요한 프로젝트 구조
    best_for:
      - 개인정보 처리
      - 결제/금융/의료/공공 데이터
      - 감사 추적 필수 프로젝트
    not_for:
      - 규제 요구가 없는 빠른 실험
      - 보안 검토 체계가 필요 없는 내부 도구
    complexity: high
    governance_level: high
    agent_structure: role-based-router
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: maintenance-operations
    name: Maintenance Operations
    path: templates/maintenance-operations
    description: 운영 중인 서비스의 유지보수, 장애 대응, 릴리즈 관리를 위한 구조
    best_for:
      - 운영 중인 서비스
      - 장애 대응
      - 정기 릴리즈와 패치
    not_for:
      - 아직 배포되지 않은 신규 실험
      - 운영 절차가 필요 없는 일회성 도구
    complexity: medium
    governance_level: medium
    agent_structure: single-agent-instruction
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: ai-data-project
    name: AI Data Project
    path: templates/ai-data-project
    description: AI, 데이터, LLM, 모델 평가 프로젝트를 위한 구조
    best_for:
      - LLM/RAG 프로젝트
      - 모델 평가
      - 데이터 파이프라인과 실험 관리
    not_for:
      - 일반 CRUD 앱
      - 데이터와 평가가 핵심이 아닌 프로젝트
    complexity: medium
    governance_level: medium
    agent_structure: role-based-router
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - inputs
      - harness
      - docs
      - skills
  - id: production-agent-system
    name: Production Agent System
    path: templates/production-agent-system
    description: 실제 AI Agent 서비스를 생성, 실행, 평가, 추적, 배포하기 위한 시스템 템플릿
    best_for:
      - 실제 AI Agent API 서버
      - tool calling이 있는 Agent
      - RAG, workflow, background worker가 필요한 Agent
      - 평가와 tracing이 필요한 Agent
      - 운영 배포 대상 Agent
    not_for:
      - 단순 문서 정리 프로젝트
      - 빠른 MVP 문서 템플릿
      - Agent runtime이 필요 없는 일반 앱
    complexity: high
    governance_level: high
    agent_structure: runtime-system
    includes:
      - README.md
      - AGENTS.md
      - manifest.yaml
      - INIT.md
      - CLAUDE.md
      - src
      - tests
      - tools
      - memory
      - evals
      - observability
      - security
      - deploy
      - inputs
      - harness
      - docs
      - skills
